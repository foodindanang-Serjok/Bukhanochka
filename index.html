  <title>Буханочка</title>
  <link rel="manifest" href="manifest.json"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { touch-action: none; overflow: hidden; height: 100%; }
    body {
      background: #0d0d1f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      font-family: sans-serif;
      overflow: hidden;
      touch-action: none;
    }
    #hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 360px;
      padding: 4px 4px;
      color: #cc99ff;
      font-size: 14px;
    }
    #hud span { font-size: 18px; font-weight: bold; color: #fff; }
    #canvas { display: block; border-radius: 12px; touch-action: none; }

    #controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 360px;
      margin-top: 10px;
      padding: 0 4px;
    }
    .btn-arrow {
      width: 64px; height: 64px; font-size: 28px;
      border-radius: 16px; border: 2px solid #7733cc;
      background: rgba(170,102,255,0.15); color: #fff;
      cursor: pointer; user-select: none;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-arrow:active { background: rgba(170,102,255,0.4); }

    /* Центральные кнопки паузы и рестарта */
    #btn-center {
      display: flex;
      gap: 10px;
    }
    .btn-ctrl {
      width: 52px; height: 52px; font-size: 20px;
      border-radius: 14px; border: 2px solid #7733cc;
      background: rgba(170,102,255,0.15); color: #fff;
      cursor: pointer; user-select: none;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-ctrl:active { background: rgba(170,102,255,0.4); }

    /* Экран паузы */
    #pause-screen {
      display: none;
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(5,0,20,0.82);
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; z-index: 10;
    }
    #pause-screen h2 { font-size: 32px; color: #fff; }
    #pause-screen p  { font-size: 15px; color: #cc99ff; }
    .pause-btn {
      padding: 12px 36px; font-size: 18px; font-weight: bold;
      border-radius: 12px; border: none; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #btn-resume  { background: #7733cc; color: #fff; }
    #btn-restart-pause { background: rgba(255,255,255,0.1); color: #fff; border: 2px solid #7733cc; }

    /* Стартовый / game over оверлей */
    #overlay {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      background: rgba(0,0,0,0.45);
      z-index: 20;
    }
    #overlay-cover {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover; z-index: 0;
    }
    #overlay-content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; padding-bottom: 48px; gap: 12px;
    }
    #overlay-title  { font-size: 32px; color: #fff; font-weight: bold; text-shadow: 0 2px 8px #000; }
    #overlay-score  { font-size: 18px; color: #cc99ff; display: none; }
    #btn-start {
      padding: 14px 48px; font-size: 20px; font-weight: bold;
      border-radius: 14px; border: none;
      background: #ff6600; color: #fff; cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,100,0,0.5);
      letter-spacing: 1px; -webkit-tap-highlight-color: transparent;
    }
    #btn-start:active { background: #cc4400; }
    #level-badge { font-size: 13px; color: #ffdd44; }
  </style>
</head>
<body>

<div id="hud">
  <div>Счёт<br><span id="score-val">0</span></div>
  <div id="level-badge">УРОВЕНЬ 1</div>
  <div style="text-align:right">Жизни<br><span id="lives-val">❤️❤️❤️</span></div>
</div>

<canvas id="canvas" width="360" height="480"></canvas>

<div id="controls">
  <div class="btn-arrow" id="btn-left">◀</div>
  <div id="btn-center">
    <div class="btn-ctrl" id="btn-pause">⏸</div>
    <div class="btn-ctrl" id="btn-restart">↺</div>
  </div>
  <div class="btn-arrow" id="btn-right">▶</div>
</div>

<!-- Экран паузы -->
<div id="pause-screen">
  <h2>⏸ Пауза</h2>
  <p>Буханочка отдыхает</p>
  <button class="pause-btn" id="btn-resume">▶ Продолжить</button>
  <button class="pause-btn" id="btn-restart-pause">↺ Начать сначала</button>
</div>

<!-- Стартовый / game over оверлей -->
<div id="overlay">
  <img id="overlay-cover" src="cover.png" alt="Буханочка"/>
  <div id="overlay-content">
    <div id="overlay-title">🚐 Буханочка</div>
    <div id="overlay-score"></div>
    <button id="btn-start">▶ ПОЕХАЛИ!</button>
  </div>
</div>

<script src="game.js"></script>
<script>
  // Блокируем зум
  document.addEventListener('touchstart', e => {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });
  let lastTap = 0;
  document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTap < 300) e.preventDefault();
    lastTap = now;
  }, { passive: false });
  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('gesturechange', e => e.preventDefault());
  document.addEventListener('gestureend', e => e.preventDefault());
</script>
</body>
</html>
