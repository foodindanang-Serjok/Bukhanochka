<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#1a1a2e"/>
  <title>Буханочка</title>
  <link rel="manifest" href="manifest.json"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      font-family: sans-serif;
      overflow: hidden;
      touch-action: none;
    }
    #hud {
      display: flex;
      justify-content: space-between;
      width: 360px;
      padding: 6px 4px;
      color: #cc99ff;
      font-size: 14px;
    }
    #hud span { font-size: 18px; font-weight: bold; color: #fff; }
    #canvas {
      display: block;
      border-radius: 12px;
      touch-action: none;
    }
    #controls {
      display: flex;
      gap: 24px;
      margin-top: 12px;
    }
    .btn-arrow {
      width: 64px;
      height: 64px;
      font-size: 28px;
      border-radius: 16px;
      border: 2px solid #7733cc;
      background: rgba(170,102,255,0.15);
      color: #fff;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-arrow:active { background: rgba(170,102,255,0.4); }
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10,5,30,0.82);
    }
    #overlay h1 { font-size: 36px; color: #fff; margin-bottom: 8px; }
    #overlay p  { font-size: 15px; color: #aa88ff; margin-bottom: 28px; }
    #overlay button {
      padding: 12px 40px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      background: #7733cc;
      color: #fff;
      cursor: pointer;
    }
    #overlay button:hover { background: #9944ee; }
    #level-badge {
      font-size: 13px;
      color: #ffdd44;
      margin-top: 6px;
    }
  </style>
</head>
<body>

<div id="hud">
  <div>Счёт<br><span id="score-val">0</span></div>
  <div id="level-badge">УРОВЕНЬ 1</div>
  <div style="text-align:right">Жизни<br><span id="lives-val">❤️❤️❤️</span></div>
</div>

<canvas id="canvas" width="360" height="480"></canvas>

<div id="controls">
  <div class="btn-arrow" id="btn-left">◀</div>
  <div class="btn-arrow" id="btn-right">▶</div>
</div>

<div id="overlay">
  <h1>🚐 Буханочка</h1>
  <p>Объезжай препятствия!</p>
  <button id="btn-start">Поехали!</button>
</div>

<script src="game.js"></script>
</body>
</html>
